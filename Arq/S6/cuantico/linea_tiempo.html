<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computación Cuántica: Experiencia AR Virtual</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050a15;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 10, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
            border-radius: 12px;
        }

        .hologram-btn {
            pointer-events: auto;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
            border: 1px solid var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
            font-size: 0.75rem;
        }

        .hologram-btn:hover:not(:disabled) {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 25px var(--neon-blue);
        }

        .hologram-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            border-color: #444;
        }

        .milestone-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 850px;
            /* Un poco más ancho para las flechas laterales */
            max-height: 85vh;
            z-index: 100;
            pointer-events: none;
            /* Cambiado para permitir clics en hijos específicos */
        }

        .popup-inner {
            pointer-events: auto;
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }

        /* Estilos de las flechas laterales */
        .side-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            z-index: 110;
            font-size: 1.5rem;
            backdrop-filter: blur(5px);
        }

        .side-nav:hover:not(.disabled) {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .side-nav.disabled {
            opacity: 0.1;
            cursor: not-allowed;
            border-color: #333;
        }

        .side-nav-prev {
            left: -60px;
            border-radius: 12px 0 0 12px;
        }

        .side-nav-next {
            right: -60px;
            border-radius: 0 12px 12px 0;
        }

        @media (max-width: 1024px) {
            .side-nav-prev {
                left: 0;
            }

            .side-nav-next {
                right: 0;
            }
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .shadow-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>

        let scene, camera, renderer, controls, raycaster, mouse;
        let particles, nodes = [];
        let currentIndex = -1;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('experience-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 60;
            controls.minDistance = 2;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            scene.add(new THREE.AmbientLight(0x404040, 3));
            const pl = new THREE.PointLight(0x00f2ff, 2.5, 100);
            pl.position.set(15, 15, 15);
            scene.add(pl);

            const pCount = 4000;
            const pPos = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount * 3; i++) pPos[i] = (Math.random() - 0.5) * 150;
            const pGeo = new THREE.BufferGeometry();
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.04, color: 0x00f2ff, transparent: true, opacity: 0.25 }));
            scene.add(particles);

            createTimeline();
            resetCamera();

            window.addEventListener('click', onDocumentMouseDown, false);
            window.addEventListener('mousemove', onDocumentMouseMove, false);
            animate();
        }

        function createTextLabel(text, year) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 320;
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0, 242, 255, 0.5)';
            ctx.font = 'bold 54px Orbitron';
            ctx.fillStyle = '#00f2ff';
            ctx.textAlign = 'center';
            ctx.fillText(year, 256, 80);
            ctx.shadowBlur = 0;
            ctx.font = '36px Rajdhani';
            ctx.fillStyle = '#ffffff';
            const words = text.split(' ');
            let line = '';
            let lines = [];
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > 460 && n > 0) {
                    lines.push(line);
                    line = words[n] + ' ';
                } else {
                    line = testLine;
                }
            }
            lines.push(line);
            let yStart = 150;
            lines.forEach((l, index) => {
                ctx.fillText(l.trim(), 256, yStart + (index * 48));
            });
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(6, 3.75, 1);
            return sprite;
        }

        function createTimeline() {
            milestones.forEach((m, i) => {
                const group = new THREE.Group();
                group.userData = { index: i };
                const node = new THREE.Mesh(
                    new THREE.SphereGeometry(0.6, 32, 32),
                    new THREE.MeshPhongMaterial({ color: m.color, emissive: m.color, emissiveIntensity: 0.8, shininess: 100 })
                );
                node.userData = { clickable: true, index: i };
                group.add(node);
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(0.9, 0.04, 16, 100),
                    new THREE.MeshBasicMaterial({ color: m.color, transparent: true, opacity: 0.3 })
                );
                ring.rotation.x = Math.PI / 2;
                group.add(ring);
                const label = createTextLabel(m.title, m.year);
                label.position.y = 2.4;
                group.add(label);
                const angle = i * 0.45;
                const radius = 18;
                group.position.set(Math.sin(angle) * radius, i * -4, Math.cos(angle) * radius - 10);
                nodes.push(group);
                scene.add(group);
            });
        }

        function onDocumentMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const isHovering = intersects.some(intersect => intersect.object.userData.clickable);
            document.body.style.cursor = isHovering ? 'pointer' : 'default';
        }

        function onDocumentMouseDown(event) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            for (let i = 0; i < intersects.length; i++) {
                if (intersects[i].object.userData.clickable) {
                    goToMilestone(intersects[i].object.userData.index);
                    break;
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.0002;
            controls.update();
            nodes.forEach((n, i) => {
                const scale = (currentIndex === i) ? 1.5 : 1;
                n.scale.lerp(new THREE.Vector3(scale, scale, scale), 0.1);
                n.children.forEach(child => {
                    if (child instanceof THREE.Sprite) child.lookAt(camera.position);
                });
            });
            renderer.render(scene, camera);
        }

        function resetCamera() {
            gsap.to(camera.position, { x: 0, y: 5, z: 40, duration: 2.5, ease: "power3.inOut" });
            gsap.to(controls.target, { x: 0, y: -10, z: -10, duration: 2.5 });
            currentIndex = -1;
            closeModals();
        }

        function goToMilestone(index) {
            if (index < 0 || index >= milestones.length) return;
            currentIndex = index;
            const m = milestones[index];
            const node = nodes[index];
            gsap.to(camera.position, {
                x: node.position.x + 5,
                y: node.position.y + 1,
                z: node.position.z + 8,
                duration: 2,
                ease: "power4.out"
            });
            gsap.to(controls.target, {
                x: node.position.x,
                y: node.position.y,
                z: node.position.z,
                duration: 2
            });
            document.getElementById('year-display').innerText = m.year;
            showPopup(index);
        }

        function showPopup(index) {
            const m = milestones[index];
            const modal = document.getElementById('milestone-modal');
            const content = document.getElementById('milestone-content');

            // Actualizar estado de las flechas
            document.getElementById('nav-prev').className = index === 0 ? 'side-nav side-nav-prev disabled' : 'side-nav side-nav-prev';
            document.getElementById('nav-next').className = index === milestones.length - 1 ? 'side-nav side-nav-next disabled' : 'side-nav side-nav-next';

            content.innerHTML = `
                <div class="flex flex-col gap-6">
                    <div class="flex justify-between items-start sticky top-0 bg-transparent z-10">
                        <div>
                            <span class="text-5xl font-bold text-cyan-400 font-['Orbitron'] shadow-text">${m.year}</span>
                            <h2 class="text-2xl font-bold text-white uppercase tracking-wider mt-1 border-l-4 border-cyan-500 pl-4">${m.title}</h2>
                        </div>
                        <button onclick="closeModals()" class="bg-red-500/20 hover:bg-red-500 text-white px-4 py-2 rounded transition pointer-events-auto">CERRAR</button>
                    </div>

                    <div class="relative overflow-hidden rounded-xl border border-cyan-500/40 shadow-2xl group">
                        <img src="${m.image}" class="w-full h-80 object-cover transform group-hover:scale-105 transition duration-700 cursor-pointer" alt="${m.title}" onclick="openImageViewer(this.src)" onerror="this.src='https://via.placeholder.com/800x600/050a15/00f2ff?text=Referencia+Cientifica'">
                        <div class="absolute bottom-0 w-full bg-gradient-to-t from-black via-black/60 to-transparent p-5 pointer-events-none">
                            <span class="text-[11px] uppercase font-bold text-cyan-400 tracking-[3px]">REGISTRO HISTÓRICO: ${m.concept}</span>
                        </div>
                    </div>

                    <div class="space-y-6 text-gray-200">
                        <div class="prose prose-invert max-w-none">
                            <p class="text-lg leading-relaxed text-justify first-letter:text-4xl first-letter:font-bold first-letter:text-cyan-400 first-letter:mr-2 first-letter:float-left">
                                ${m.desc}
                            </p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-cyan-900/30 p-5 rounded-lg border-l-2 border-cyan-500">
                                <h4 class="text-xs uppercase font-bold text-cyan-400 mb-2">Impacto Técnico</h4>
                                <p class="text-sm leading-snug">${m.example}</p>
                            </div>
                            <div class="bg-purple-900/30 p-5 rounded-lg border-l-2 border-purple-500">
                                <h4 class="text-xs uppercase font-bold text-purple-400 mb-2">Análisis Crítico</h4>
                                <p class="text-sm italic leading-snug">"${m.question}"</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-center items-center py-4 border-t border-gray-800 mt-4">
                         <div class="text-center">
                            <p class="text-[10px] text-gray-500 uppercase">Hito Actual</p>
                            <p class="font-mono text-cyan-400">${index + 1} / ${milestones.length}</p>
                        </div>
                    </div>
                </div>
            `;

            modal.style.display = 'block';
            gsap.fromTo(modal, { opacity: 0, scale: 0.9, y: 50 }, { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(1.7)" });
        }

        function startJourney() { goToMilestone(0); }
        function nextStep() { if (currentIndex < milestones.length - 1) goToMilestone(currentIndex + 1); }
        function prevStep() { if (currentIndex > 0) goToMilestone(currentIndex - 1); }

        function closeModals() {
            document.querySelectorAll('.milestone-popup').forEach(m => m.style.display = 'none');
        }

        function openImageViewer(src) {
            const viewer = document.getElementById('image-viewer');
            const img = document.getElementById('image-viewer-img');
            img.src = src;
            viewer.classList.remove('hidden');
            setTimeout(() => {
                viewer.classList.remove('opacity-0');
                img.classList.remove('scale-95');
                img.classList.add('scale-100');
            }, 10);
        }

        function closeImageViewer() {
            const viewer = document.getElementById('image-viewer');
            const img = document.getElementById('image-viewer-img');
            viewer.classList.add('opacity-0');
            img.classList.remove('scale-100');
            img.classList.add('scale-95');
            setTimeout(() => {
                viewer.classList.add('hidden');
                img.src = '';
            }, 300);
        }

        function openModal(type) {
            closeModals();
            const modal = document.getElementById('special-modal');
            const content = document.getElementById('special-content');
            modal.style.display = 'block';

            if (type === 'architecture') {
                content.innerHTML = `
                    <h2 class="text-2xl font-bold text-cyan-400 mb-6 font-['Orbitron']">Ingeniería Criogénica</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="relative rounded overflow-hidden border border-cyan-500/30 group">
                             <img src="imagenes/ftqc.png" class="object-cover h-48 w-full cursor-pointer transition transform group-hover:scale-105" onclick="openImageViewer(this.src)">
                             <div class="absolute bottom-0 p-2 bg-black/70 w-full text-[10px] pointer-events-none">Crióstato de Dilución (ETH Zurich)</div>
                        </div>
                        <div class="space-y-3">
                             <h4 class="text-sm font-bold text-cyan-400">Control de la Decoherencia</h4>
                             <p class="text-xs text-gray-400 leading-relaxed">Para que los qubits funcionen, deben aislarse de toda radiación térmica. Se enfrían a 15 milikelvin, una temperatura mucho más baja que la del vacío interestelar.</p>
                             <div class="p-3 bg-cyan-900/10 border border-cyan-800 rounded">
                                <span class="text-[10px] text-cyan-500 font-bold uppercase">Componente: Líneas de Microondas</span>
                                <p class="text-[11px] text-gray-300">Cables superconductores que transmiten pulsos electromagnéticos para cambiar los estados 0 y 1.</p>
                             </div>
                        </div>
                    </div>
                `;
            } else if (type === 'bit-qubit') {
                content.innerHTML = `
                    <h2 class="text-2xl font-bold text-cyan-400 mb-6 font-['Orbitron']">Lógica de Estados</h2>
                    <div class="flex flex-col items-center mb-8 bg-black/30 p-6 rounded-xl border border-cyan-900">
                        <img src="imagenes/bloch.png" class="h-48 mb-4 invert brightness-125 cursor-pointer hover:scale-105 transition" onclick="openImageViewer(this.src)">
                        <p class="text-xs text-cyan-300 text-center max-w-sm italic">La Esfera de Bloch: Representación geométrica del estado de un qubit puro.</p>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="p-4 border border-gray-800 bg-gray-900/40 rounded-lg">
                            <h3 class="text-lg font-bold text-gray-400 mb-2">Bit (Binario)</h3>
                            <p class="text-xs text-gray-500">Determinista: Es 0 o 1. Un interruptor físico macroscópico.</p>
                        </div>
                        <div class="p-4 border border-cyan-800 bg-cyan-900/40 rounded-lg">
                            <h3 class="text-lg font-bold text-cyan-400 mb-2">Qubit (Cuántico)</h3>
                            <p class="text-xs text-cyan-300">Probabilístico: Superposición de |0⟩ y |1⟩. Aprovecha la interferencia destructiva para descartar resultados erróneos.</p>
                        </div>
                    </div>
                `;
            } else if (type === 'apps') {
                content.innerHTML = `
                    <h2 class="text-2xl font-bold text-green-400 mb-6 font-['Orbitron']">Horizonte Tecnológico</h2>
                    <div class="space-y-4 max-h-80 overflow-y-auto pr-2">
                        <div class="flex gap-4 p-4 bg-green-950/10 rounded border border-green-500/20 hover:bg-green-900/20 transition">
                            <img src="imagenes/helix.png" class="w-16 h-16 object-contain cursor-pointer hover:scale-110 transition" onclick="openImageViewer(this.src)">
                            <div>
                                <h4 class="font-bold text-green-300">Fármacos Moleculares</h4>
                                <p class="text-xs text-gray-400 mt-1">Simulación precisa de interacciones proteicas para erradicar enfermedades genéticas mediante diseño computacional directo.</p>
                            </div>
                        </div>
                        <div class="flex gap-4 p-4 bg-green-950/10 rounded border border-green-500/20 hover:bg-green-900/20 transition">
                            <img src="imagenes/battery.png" class="w-16 h-16 object-contain cursor-pointer hover:scale-110 transition" onclick="openImageViewer(this.src)">
                            <div>
                                <h4 class="font-bold text-green-300">Super-Materiales</h4>
                                <p class="text-xs text-gray-400 mt-1">Descubrimiento de compuestos para superconductores a temperatura ambiente, eliminando pérdidas en la red eléctrica global.</p>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        window.onload = () => {
            init3D();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>

</html>
