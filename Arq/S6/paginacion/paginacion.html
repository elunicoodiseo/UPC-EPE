<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Paginación</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Shim: Lucide UMD expects window.react (lowercase) -->
    <script>window.react = window.React;</script>
    <!-- Lucide React -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>

    <style>
        .perspective-container {
            perspective: 1200px;
        }

        .isometric-scene {
            transform: rotateX(20deg) rotateZ(0deg);
            transform-style: preserve-3d;
            transition: transform 1s ease;
            max-width: 60rem;
        }

        .iso-plane {
            transform-style: preserve-3d;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 0.8);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(71, 85, 105, 1);
        }

        @keyframes flowAnim {
            0% {
                stroke-dashoffset: 20;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        .animated-line {
            stroke-dasharray: 5, 5;
            animation: flowAnim 0.5s linear infinite;
        }

        .float-anim {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateZ(var(--z-base)) translateY(0px);
            }

            50% {
                transform: translateZ(var(--z-base)) translateY(-10px);
            }
        }
    </style>
</head>

<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Play, Pause, Square, SkipBack, SkipForward, FastForward, Info, Settings, X, RefreshCw, Cpu, HardDrive, Database, Monitor, Activity, Layers, Hash, ArrowRight } = LucideReact;

        const componentsData = {
            cpu: { id: 'cpu', name: 'CPU / Procesador', icon: <Cpu />, color: '#06b6d4', definition: 'Unidad principal que ejecuta instrucciones.', description: 'Coordina las operaciones del sistema y solicita datos a la memoria para poder trabajar.', role: 'Genera direcciones lógicas (virtuales) que deben ser traducidas a direcciones físicas antes de acceder a la RAM.', example: 'Cuando abres una pestaña en tu navegador, la CPU empieza a pedir datos usando direcciones virtuales como "2050".' },
            ram: { id: 'ram', name: 'RAM / Memoria física', icon: <Database />, color: '#10b981', definition: 'Memoria de trabajo rápida y temporal del equipo.', description: 'Almacena los datos e instrucciones que los programas están usando activamente en ese momento.', role: 'Contiene los "marcos físicos" (frames) reales donde se cargan y alojan las páginas virtuales.', example: 'Una página virtual de tu navegador web puede estar cargada físicamente en el Marco 5 de la RAM.' },
            ssd: { id: 'ssd', name: 'SSD / Disco', icon: <HardDrive />, color: '#f97316', definition: 'Almacenamiento secundario permanente y de gran capacidad.', description: 'Guarda todos los programas y archivos incluso cuando el equipo está apagado.', role: 'Actúa como respaldo. Guarda las páginas que no caben o aún no se necesitan en la RAM.', example: 'Si la RAM se llena, partes inactivas de un programa se guardan temporalmente en el SSD (Swap).' },
            os: { id: 'os', name: 'Sistema Operativo', icon: <Monitor />, color: '#8b5cf6', definition: 'Software principal que gestiona el hardware y software.', description: 'Controla los recursos del sistema y provee servicios a los programas en ejecución.', role: 'Administra la memoria virtual, actualiza la tabla de páginas y resuelve los Page Faults.', example: 'Windows, Linux o macOS trayendo información del SSD a la RAM cuando ocurre un fallo de página.' },
            process: { id: 'process', name: 'Proceso en ejecución', icon: <Activity />, color: '#3b82f6', definition: 'Un programa en acción que necesita memoria.', description: 'Es una instancia de un programa ejecutándose, con su propio espacio de memoria aislado.', role: 'Trabaja bajo la ilusión de que tiene toda la memoria para sí mismo, usando memoria virtual.', example: 'Google Chrome, un videojuego o Word ejecutándose en tu pantalla.' },
            vmem: { id: 'vmem', name: 'Memoria Virtual', icon: <Layers />, color: '#6366f1', definition: 'Abstracción que combina la RAM física y un espacio del disco (SSD/HDD) para simular mayor capacidad.', description: 'Se forma cuando el Sistema Operativo toma una parte del almacenamiento secundario (archivo de paginación o Swap) y la une lógicamente con la RAM real. Esto le da a cada programa la ilusión de tener una memoria enorme, contigua y exclusiva para sí mismo.', role: 'Aislar procesos y permitir que se ejecuten programas más grandes que la RAM física disponible.', example: 'Un proceso ve la memoria del byte 0 al 4000, aunque físicamente esté fragmentada.' },
            ptable: { id: 'ptable', name: 'Tabla de Páginas', icon: <Hash />, color: '#d946ef', definition: 'Estructura o mapa de traducción.', description: 'Directorio que el sistema mantiene en la RAM para rastrear dónde está cada parte de la memoria.', role: 'Relaciona cada "página virtual" con un "marco físico" de la RAM o indica si está en el disco.', example: 'Página virtual 2 → Marco físico 5 (Estado: En RAM).' },
            mmu: { id: 'mmu', name: 'MMU', icon: <Cpu />, color: '#14b8a6', definition: 'Memory Management Unit (Unidad de Gestión de Memoria).', description: 'Componente de hardware (generalmente dentro de la CPU) que hace traducciones al vuelo.', role: 'Traduce automáticamente las direcciones virtuales a físicas usando la Tabla de Páginas y la TLB.', example: 'Convierte instantáneamente la dirección virtual 2050 en la dirección física 5122.' },
            tlb: { id: 'tlb', name: 'TLB', icon: <Activity />, color: '#0ea5e9', definition: 'Translation Lookaside Buffer (Caché de traducción).', description: 'Una caché de hardware ultra rápida dentro de la MMU.', role: 'Guarda las traducciones recientes de direcciones para no tener que leer la Tabla de Páginas en la RAM cada vez.', example: 'Si recién tradujimos la Página 2, la TLB recuerda la traducción para el próximo acceso casi instantáneo.' },
            pagefault: { id: 'pagefault', name: 'Page Fault', icon: <Info />, color: '#ef4444', definition: 'Fallo de página o excepción de memoria.', description: 'Evento que ocurre cuando la CPU solicita una página que no está actualmente cargada en la RAM.', role: 'Desencadena una interrupción para que el Sistema Operativo busque la página en el SSD.', example: 'Se pide la página 3, pero la tabla dice "No cargada". El sistema se pausa un milisegundo para traerla del disco.' }
        };

        function App() {
            const [step, setStep] = useState(1);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speed, setSpeed] = useState(2500);
            const [pageFaultEnabled, setPageFaultEnabled] = useState(false);
            const [technicalMode, setTechnicalMode] = useState(false);
            const [virtualAddress, setVirtualAddress] = useState(2050);
            const [pageSize, setPageSize] = useState(1024);
            const [activePopup, setActivePopup] = useState(null);

            const calcData = useMemo(() => {
                const page = Math.floor(virtualAddress / pageSize);
                const offset = virtualAddress % pageSize;
                const mockTable = { 0: 3, 1: 1, 2: 5, 3: null };
                const activePage = pageFaultEnabled ? 3 : (mockTable[page] !== undefined ? page : 2);
                let frame = mockTable[activePage];
                let isFault = frame === null;
                let resolvedFrame = isFault ? 7 : frame;
                let physicalAddress = resolvedFrame * pageSize + offset;
                return { page: activePage, offset, frame, isFault, resolvedFrame, physicalAddress };
            }, [virtualAddress, pageSize, pageFaultEnabled]);

            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        setStep(prev => {
                            if (prev >= 9) {
                                setIsPlaying(false);
                                return 9;
                            }
                            return prev + 1;
                        });
                    }, speed);
                }
                return () => clearInterval(interval);
            }, [isPlaying, speed]);

            const handleRestart = () => { setStep(1); setIsPlaying(false); };
            const handlePrev = () => { setStep(prev => Math.max(1, prev - 1)); setIsPlaying(false); };
            const handleNext = () => { setStep(prev => Math.min(9, prev + 1)); setIsPlaying(false); };

            const stepsData = [
                { num: 1, title: "1. Un proceso se ejecuta", basicText: "Un programa en ejecución (como tu navegador) necesita acceder a datos almacenados en memoria para poder funcionar.", techText: "El OS crea un PCB (Process Control Block) y asigna un espacio de direccionamiento virtual. El proceso emite solicitudes de lectura/escritura a memoria.", activeEls: ['process'] },
                { num: 2, title: "2. La CPU genera dirección virtual", basicText: "La CPU genera una dirección virtual, no una dirección física directa. Es como pedir 'Libro 5, página 10' sin saber en qué biblioteca está.", techText: "El procesador ejecuta una instrucción (ej. LOAD/STORE) que hace referencia a una dirección lógica dentro del segmento de memoria asignado al proceso.", activeEls: ['cpu', 'vmem', 'process'] },
                { num: 3, title: "3. División: Página y Offset", basicText: `El número de página indica qué bloque se busca. El offset indica la posición exacta dentro de ese bloque.\nDirección: ${virtualAddress} = Página ${calcData.page} + Offset ${calcData.offset}`, techText: `La dirección virtual se divide mediante operaciones de enmascaramiento binario (bitmasking). Con un tamaño de ${pageSize} bytes, los bits superiores forman la Página Virtual (VPN) y los inferiores el Desplazamiento (Offset).`, activeEls: ['vmem'] },
                { num: 4, title: "4. MMU consulta la TLB", basicText: "La MMU revisa primero la TLB, una memoria súper rápida. Si ya sabía dónde estaba esa página, se ahorra buscar en la Tabla de Páginas.", techText: "La Translation Lookaside Buffer (TLB) es una caché asociativa en la MMU. Si ocurre un 'TLB Miss', la MMU debe realizar un 'Page Walk' hacia la memoria principal.", activeEls: ['mmu', 'tlb'] },
                { num: 5, title: "5. Consulta a la Tabla de Páginas", basicText: "Como no estaba en la TLB, se revisa la Tabla de Páginas. Este mapa nos dice dónde está ubicada cada página virtual en la RAM física.", techText: "La MMU usa el registro base de la tabla de páginas (PTBR) para localizar la tabla en RAM y sumar el VPN para encontrar el Page Table Entry (PTE).", activeEls: ['ptable', 'ram'] },
                { num: 6, title: "6. Cálculo de Dirección Física", basicText: calcData.isFault ? "¡Oops! La tabla indica que la página no está cargada en la RAM actual." : `¡Página encontrada en el Marco ${calcData.frame}! El offset se mantiene. Nueva base: Marco ${calcData.frame} × ${pageSize} + ${calcData.offset} = Dirección Física ${calcData.physicalAddress}`, techText: calcData.isFault ? "El bit de validez en el PTE está en 0, lo que indica que la página está en almacenamiento secundario o no asignada." : `El Physical Frame Number (PFN) se combina con el Offset. PFN (${calcData.frame}) << offset_bits | offset (${calcData.offset}) = PA ${calcData.physicalAddress}.`, activeEls: ['mmu', 'ram'] },
                { num: 7, title: calcData.isFault ? "7. PAGE FAULT (Fallo de página)" : "7. Sin Page Fault", basicText: calcData.isFault ? "Page Fault: la página no está en RAM. El OS la trae desde el SSD, la pone en un marco libre (ej. Marco 7) y actualiza la tabla." : "La página ya estaba en la RAM, así que no necesitamos ir al disco (SSD). El proceso es muy rápido.", techText: calcData.isFault ? "Se lanza una excepción al SO (Page Fault Handler). El SO ubica la página en el SSD, hace un swap-in a un frame libre, actualiza el PTE (validez=1) y reanuda la instrucción." : "No hubo trap del sistema operativo. El hardware resolvió toda la traducción.", activeEls: calcData.isFault ? ['ssd', 'ram', 'os', 'pagefault'] : ['ram'] },
                { num: 8, title: "8. Acceso al dato en RAM", basicText: `La CPU finalmente accede al dato en la dirección física calculada (${calcData.physicalAddress}) y el programa continúa ejecutándose sin notar la pausa.`, techText: "La solicitud se envía por el Bus de Datos hacia el controlador de memoria, que accede a las celdas físicas de la DRAM y retorna la palabra a la caché/CPU.", activeEls: ['cpu', 'ram'] },
                { num: 9, title: "9. Impacto Global", basicText: "La paginación permite que varios programas compartan la memoria de forma organizada, segura y eficiente, usando el SSD cuando falta RAM.", techText: "Esta arquitectura permite la multiprogramación, aislamiento de memoria (cada proceso tiene propio espacio) y overcommitting de RAM usando Swap/Paging space.", activeEls: ['os', 'cpu', 'ram', 'ssd', 'process', 'vmem', 'ptable'] }
            ];

            const currentStepData = stepsData[step - 1];

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200 font-sans flex flex-col overflow-hidden relative">
                    <header className="bg-slate-900/80 backdrop-blur border-b border-slate-800 p-4 flex flex-wrap justify-between items-center z-20">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg">
                                <Layers size={24} className="text-white" />
                            </div>
                            <h1 className="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">
                                Simulador de Paginación 3D
                            </h1>
                        </div>
                        <div className="flex items-center gap-4 bg-slate-950/50 p-2 rounded-xl border border-slate-800 text-sm flex-wrap mt-3 md:mt-0">
                            <label className="flex items-center gap-2 cursor-pointer group">
                                <span className="text-slate-400 group-hover:text-white transition">Dir. Virtual:</span>
                                <input type="number" value={virtualAddress} onChange={(e) => setVirtualAddress(Number(e.target.value))} className="w-20 bg-slate-800 border-slate-700 rounded px-2 py-1 text-white outline-none focus:border-blue-500" />
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer group">
                                <span className="text-slate-400 group-hover:text-white transition">Tamaño Pág:</span>
                                <select value={pageSize} onChange={(e) => setPageSize(Number(e.target.value))} className="bg-slate-800 border-slate-700 rounded px-2 py-1 text-white outline-none focus:border-blue-500">
                                    <option value="512">512 B</option>
                                    <option value="1024">1024 B (1KB)</option>
                                    <option value="4096">4096 B (4KB)</option>
                                </select>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer group bg-slate-800/50 px-3 py-1 rounded-lg">
                                <input type="checkbox" checked={pageFaultEnabled} onChange={(e) => setPageFaultEnabled(e.target.checked)} className="w-4 h-4 accent-red-500" />
                                <span className={`transition ${pageFaultEnabled ? 'text-red-400 font-bold' : 'text-slate-400 group-hover:text-white'}`}>Forzar Page Fault</span>
                            </label>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        <section className="flex-1 relative perspective-container overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black p-4 flex items-center justify-center">
                            <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAwIDQwIEwgNDAgNDAgTCA0MCAwIiBmaWxsPSJub25lIiBzdHJva2U9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiIHN0cm9rZS13aWR0aD0iMSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNncmlkKSIvPjwvc3ZnPg==')] opacity-30"></div>

                            <div className="isometric-scene w-full max-w-2xl aspect-square md:aspect-video relative">
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100%] h-[100%] bg-slate-900/60 backdrop-blur-md border border-slate-700/50 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center p-8 iso-plane z-0">
                                    <span className="absolute bottom-4 left-4 text-slate-500 font-mono text-sm tracking-widest uppercase">System_Motherboard_v2.0</span>
                                </div>

                                <IsometricBlock data={componentsData.cpu} x="10%" y="20%" z={10} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('cpu')} />
                                <IsometricBlock data={componentsData.mmu} x="22%" y="40%" z={15} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('mmu')} scale={0.7} />
                                <IsometricBlock data={componentsData.tlb} x="30%" y="30%" z={20} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('tlb')} scale={0.6} />

                                <IsometricBlock data={componentsData.ram} x="60%" y="10%" z={10} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('ram')} isWide />
                                <IsometricBlock data={componentsData.ssd} x="60%" y="60%" z={10} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('ssd')} isWide />

                                <HoloPlane data={componentsData.os} x="20%" y="-10%" z={80} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('os')} />
                                <HoloPlane data={componentsData.process} x="-5%" y="40%" z={100} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('process')} />
                                <HoloPlane data={componentsData.vmem} x="-10%" y="65%" z={120} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('vmem')} width="150px" />
                                <HoloPlane data={componentsData.ptable} x="40%" y="45%" z={90} activeEls={currentStepData.activeEls} onClick={() => setActivePopup('ptable')} width="140px" />

                                {step === 7 && currentStepData.activeEls.includes('pagefault') && (
                                    <div className="absolute top-[40%] left-[50%] z-[150] animate-bounce cursor-pointer" onClick={() => setActivePopup('pagefault')}>
                                        <div className="bg-red-500/20 border-2 border-red-500 text-red-100 px-4 py-2 rounded-xl shadow-[0_0_30px_rgba(239,68,68,0.6)] flex items-center gap-2 backdrop-blur-md">
                                            <Info size={20} className="text-red-400" />
                                            <span className="font-bold">¡PAGE FAULT!</span>
                                        </div>
                                    </div>
                                )}

                                <DataFlow step={step} activeEls={currentStepData.activeEls} isFault={calcData.isFault} />
                            </div>
                        </section>

                        <section className="w-full lg:w-96 bg-slate-900 border-l border-slate-800 flex flex-col z-20">
                            <div className="p-4 border-b border-slate-800 bg-slate-900/50">
                                <div className="flex justify-between items-center mb-4">
                                    <span className="text-xs uppercase tracking-wider text-slate-500 font-bold">Modo de Simulación</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => setSpeed(3500)} className={`px-2 py-1 text-xs rounded ${speed === 3500 ? 'bg-slate-700 text-white' : 'bg-slate-800 text-slate-400'} hover:bg-slate-700 transition`}>Lento</button>
                                        <button onClick={() => setSpeed(2000)} className={`px-2 py-1 text-xs rounded ${speed === 2000 ? 'bg-slate-700 text-white' : 'bg-slate-800 text-slate-400'} hover:bg-slate-700 transition`}>Normal</button>
                                    </div>
                                </div>

                                <div className="flex items-center justify-center gap-2">
                                    <button onClick={handlePrev} title="Anterior" className="px-4 py-2 bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition flex items-center gap-1.5 font-medium">
                                        <SkipBack size={16} /> Atrás
                                    </button>

                                    <button onClick={() => { if (step === 9 && !isPlaying) { setStep(1); setIsPlaying(true); } else { setIsPlaying(!isPlaying); } }} className={`px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition-all ${isPlaying ? 'bg-orange-500 hover:bg-orange-600 text-white shadow-[0_0_15px_rgba(249,115,22,0.4)]' : 'bg-green-600 hover:bg-green-500 text-white shadow-[0_0_15px_rgba(22,163,74,0.4)]'}`}>
                                        {isPlaying ? <><Pause size={20} /> Pausar</> : <><Play size={20} /> {step === 9 ? 'Reiniciar' : 'Iniciar'}</>}
                                    </button>

                                    <button onClick={handleNext} title="Siguiente" className="px-4 py-2 bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition flex items-center gap-1.5 font-medium">
                                        Siguiente <SkipForward size={16} />
                                    </button>
                                </div>
                                <div className="mt-4 flex gap-1 justify-between">
                                    {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(i => (
                                        <div key={i} onClick={() => { setStep(i); setIsPlaying(false); }} className={`h-2 flex-1 rounded cursor-pointer transition-all ${step >= i ? 'bg-blue-500 shadow-[0_0_5px_rgba(59,130,246,0.5)]' : 'bg-slate-800 hover:bg-slate-700'}`} title={`Paso ${i}`}></div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-6 custom-scrollbar">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-500/20 text-blue-400 p-2 rounded border border-blue-500/30">
                                        <Hash size={24} />
                                    </div>
                                    <h2 className="text-xl font-bold text-white">{currentStepData.title}</h2>
                                </div>

                                <div className="bg-slate-800/50 p-1 rounded-lg flex relative border border-slate-700/50">
                                    <div className={`absolute top-1 bottom-1 w-[calc(50%-4px)] bg-slate-700 rounded-md transition-all duration-300 ease-out shadow-sm ${technicalMode ? 'left-[calc(50%+2px)]' : 'left-1'}`}></div>
                                    <button onClick={() => setTechnicalMode(false)} className={`flex-1 py-1.5 text-sm font-medium z-10 transition-colors ${!technicalMode ? 'text-white' : 'text-slate-400 hover:text-slate-200'}`}>Explicación Actual</button>
                                    <button onClick={() => setTechnicalMode(true)} className={`flex-1 py-1.5 text-sm font-medium z-10 transition-colors flex items-center justify-center gap-1 ${technicalMode ? 'text-cyan-300' : 'text-slate-400 hover:text-slate-200'}`}>
                                        <Settings size={14} /> Detalle Técnico
                                    </button>
                                </div>

                                <div className="bg-slate-800/40 rounded-xl p-5 border border-slate-700/50 text-slate-300 leading-relaxed min-h-[150px] shadow-inner">
                                    <p className="whitespace-pre-line text-[15px]">
                                        {technicalMode ? currentStepData.techText : currentStepData.basicText}
                                    </p>
                                </div>

                                <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-md">
                                    <h3 className="text-xs uppercase tracking-widest text-slate-500 mb-3 font-bold border-b border-slate-800 pb-2">Estado de Memoria</h3>
                                    <div className="grid grid-cols-2 gap-3 text-sm">
                                        <div className="bg-slate-950 p-2 rounded flex flex-col">
                                            <span className="text-slate-500 text-xs">Dir. Virtual</span>
                                            <span className="text-blue-400 font-mono">{virtualAddress}</span>
                                        </div>
                                        <div className="bg-slate-950 p-2 rounded flex flex-col">
                                            <span className="text-slate-500 text-xs">Página virtual</span>
                                            <span className="text-purple-400 font-mono">{calcData.page}</span>
                                        </div>
                                        <div className="bg-slate-950 p-2 rounded flex flex-col">
                                            <span className="text-slate-500 text-xs">Offset</span>
                                            <span className="text-slate-300 font-mono">{calcData.offset}</span>
                                        </div>
                                        <div className="bg-slate-950 p-2 rounded flex flex-col">
                                            <span className="text-slate-500 text-xs">Marco Físico</span>
                                            <span className={step >= 6 ? "text-green-400 font-mono" : "text-slate-600 font-mono"}>{step >= 5 ? calcData.resolvedFrame : '?'}</span>
                                        </div>
                                    </div>
                                    {step >= 6 && (
                                        <div className="mt-3 bg-green-900/20 border border-green-500/30 p-2 rounded flex flex-col items-center">
                                            <span className="text-green-500 text-xs mb-1">Dirección Física Resultante</span>
                                            <span className="text-green-400 font-mono text-lg font-bold">{calcData.physicalAddress}</span>
                                        </div>
                                    )}
                                </div>

                                <div className="text-center mt-auto pb-4">
                                    <p className="text-xs text-slate-500 flex items-center justify-center gap-1">
                                        <Info size={12} /> Haz clic en cualquier componente 3D para ver sus detalles.
                                    </p>
                                    <span class="text-[12px] text-gray-400 tracking-widest font-bold mb-1">© 2026 —
                                        Experiencia Técnica Interactiva. Fines educativos -
                                        Luis
                                        Torrejón.</span>
                                </div>
                            </div>
                        </section>
                    </main>

                    {activePopup && componentsData[activePopup] && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onClick={() => setActivePopup(null)}>
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-md w-full shadow-[0_20px_60px_-15px_rgba(0,0,0,0.8)] relative transform transition-all scale-100" onClick={(e) => e.stopPropagation()}>
                                <button className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-800 rounded-full p-1 transition-colors" onClick={() => setActivePopup(null)}>
                                    <X size={20} />
                                </button>

                                <div className="flex items-center gap-4 mb-6">
                                    <div className="p-3 rounded-xl shadow-lg" style={{ backgroundColor: `${componentsData[activePopup].color}20`, color: componentsData[activePopup].color, border: `1px solid ${componentsData[activePopup].color}40` }}>
                                        {componentsData[activePopup].icon}
                                    </div>
                                    <h2 className="text-2xl font-bold text-white">{componentsData[activePopup].name}</h2>
                                </div>

                                <div className="space-y-4 text-sm text-slate-300">
                                    <div>
                                        <span className="text-slate-400 text-xs font-bold uppercase tracking-wider block mb-1">Definición</span>
                                        <p className="bg-slate-950/50 p-3 rounded-lg border border-slate-800">{componentsData[activePopup].definition}</p>
                                    </div>
                                    <div>
                                        <span className="text-slate-400 text-xs font-bold uppercase tracking-wider block mb-1">Descripción</span>
                                        <p className="leading-relaxed">{componentsData[activePopup].description}</p>
                                    </div>
                                    <div>
                                        <span className="text-slate-400 text-xs font-bold uppercase tracking-wider block mb-1">Rol en paginación</span>
                                        <p className="leading-relaxed border-l-2 pl-3" style={{ borderColor: componentsData[activePopup].color }}>{componentsData[activePopup].role}</p>
                                    </div>
                                    <div className="bg-blue-900/20 border border-blue-800/30 p-3 rounded-lg flex gap-3 items-start">
                                        <Activity size={18} className="text-blue-400 flex-shrink-0 mt-0.5" />
                                        <div>
                                            <span className="text-blue-300 font-bold block mb-0.5">Ejemplo simple</span>
                                            <p className="text-blue-200/80 italic">{componentsData[activePopup].example}</p>
                                        </div>
                                    </div>
                                </div>

                                <button className="mt-6 w-full py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition font-medium" onClick={() => setActivePopup(null)}>
                                    Cerrar
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function IsometricBlock({ data, x, y, z, activeEls, onClick, isWide = false, scale = 1 }) {
            const isActive = activeEls.includes(data.id);
            const w = isWide ? '160px' : '90px';
            const h = isWide ? '60px' : '90px';
            const glow = isActive ? `0 0 25px ${data.color}, inset 0 0 10px ${data.color}` : 'none';
            const border = isActive ? `2px solid ${data.color}` : '1px solid rgba(255,255,255,0.1)';

            return (
                <div className={`absolute flex flex-col items-center justify-center cursor-pointer transition-all duration-300 hover:scale-105 iso-plane group`} style={{ left: x, top: y, width: w, height: h, transform: `translateZ(${z}px) scale(${scale})` }} onClick={onClick}>
                    <div className="w-full h-full bg-slate-800/90 rounded-md relative flex items-center justify-center transition-all duration-300" style={{ boxShadow: glow, border }}>
                        <div className="text-slate-400 group-hover:text-white transition-colors" style={{ color: isActive ? data.color : '' }}>
                            {data.icon}
                        </div>
                        <div className={`absolute -top-8 bg-slate-900/90 border px-3 py-1 rounded text-xs font-bold whitespace-nowrap transition-all ${isActive ? 'text-white scale-110 opacity-100 z-10' : 'text-slate-400 border-slate-700 opacity-80'}`} style={{ borderColor: isActive ? data.color : '' }}>
                            {data.name}
                        </div>
                    </div>
                    <div className="absolute inset-0 bg-slate-900 rounded-md -z-10 translate-x-[3px] translate-y-[3px] opacity-60"></div>
                </div>
            );
        }

        function HoloPlane({ data, x, y, z, activeEls, onClick, width = "120px" }) {
            const isActive = activeEls.includes(data.id);
            const glow = isActive ? `0 0 30px ${data.color}80, inset 0 0 20px ${data.color}40` : '0 10px 30px rgba(0,0,0,0.5)';
            const border = isActive ? `2px solid ${data.color}` : `1px solid ${data.color}50`;

            return (
                <div className="absolute flex items-center justify-center cursor-pointer float-anim iso-plane group backdrop-blur-sm" style={{ left: x, top: y, width, height: "70px", '--z-base': `${z}px`, transform: `translateZ(${z}px)` }} onClick={onClick}>
                    <div className="w-full h-full bg-slate-900/60 rounded-xl relative flex flex-col items-center justify-center transition-all duration-300" style={{ boxShadow: glow, border }}>
                        <div className="mb-1" style={{ color: isActive ? '#fff' : data.color }}>
                            {data.icon}
                        </div>
                        <div className={`text-xs font-bold text-center px-2 leading-tight transition-colors ${isActive ? 'text-white' : 'text-slate-300'}`}>
                            {data.name}
                        </div>
                        <div className={`absolute w-px h-[${z}px] top-full bg-gradient-to-b opacity-20`} style={{ height: `${z}px`, backgroundImage: `linear-gradient(to bottom, ${data.color}, transparent)` }}></div>
                    </div>
                </div>
            );
        }

        function DataFlow({ step, activeEls, isFault }) {
            const getPath = () => {
                switch (step) {
                    case 2: return "M 20 25 L 20 65 L 10 65";
                    case 3: return "";
                    case 4: return "M 32 45 L 35 35";
                    case 5: return "M 32 45 L 50 45 L 70 20";
                    case 6:
                        if (isFault) return "M 50 45 L 32 45";
                        return "M 32 45 L 70 20";
                    case 7:
                        if (isFault) return "M 70 65 L 70 20";
                        return "";
                    case 8: return "M 20 25 L 20 15 L 70 15 L 70 20";
                    default: return "";
                }
            };

            const path = getPath();
            if (!path) return null;

            return (
                <div className="absolute inset-0 pointer-events-none z-50 transform-style-preserve-3d" style={{ transform: 'translateZ(15px)' }}>
                    <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible" preserveAspectRatio="none">
                        <path d={path} fill="none" stroke={isFault && step === 7 ? '#ef4444' : '#3b82f6'} strokeWidth="1" className="animated-line opacity-80" />
                    </svg>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
